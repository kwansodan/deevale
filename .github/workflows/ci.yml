name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: launchgh
          POSTGRES_PASSWORD: launchgh
          POSTGRES_DB: launchgh_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U launchgh"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      FLASK_ENV: testing
      TEST_DATABASE_URL: postgresql+psycopg2://launchgh:launchgh@localhost:5432/launchgh_test
      REDIS_URL: redis://localhost:6379/0
      RATELIMIT_STORAGE_URI: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Tests (pytest)
        run: pytest -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (oxlint)
        run: npm run lint
      - name: Typecheck + build
        run: npm run build
