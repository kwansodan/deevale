# Pinned so the project name never depends on the directory. Without it Compose
# derives the name from the folder, and a rename (or a clone into a different
# path) silently creates a SECOND project whose containers fight over the same
# host ports.
name: deevalegh

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: deevalegh
      POSTGRES_PASSWORD: deevalegh
      POSTGRES_MULTIPLE_DATABASES: deevalegh,deevalegh_test
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    # Host ports are overridable so a conflict with a host-installed service (or
    # another project) is a one-line .env change, not a file edit. Container
    # ports stay fixed -- DATABASE_URL inside the network is unaffected.
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deevalegh"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: deevalegh
      MINIO_ROOT_PASSWORD: deevalegh-secret
    ports:
      - "${MINIO_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "${MAILHOG_SMTP_HOST_PORT:-1025}:1025"
      - "${MAILHOG_UI_HOST_PORT:-8025}:8025"

volumes:
  pgdata:
  minio_data:
